    <main class="pt-28 pb-24 px-4 md:px-12 max-w-[1600px] mx-auto w-full flex-grow">
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-none mb-4 text-white" data-i18n="fav_title">YOUR<br/><span class="text-primary">COLLECTION</span></h1>
            <p class="text-neutral-500 uppercase tracking-widest text-sm" data-i18n="fav_subtitle">Saved Vehicles</p>
        </header>

        <div id="favorites-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24">
            <!-- Loading State -->
            <div class="col-span-full text-center text-neutral-500 py-12">Loading favorites...</div>
        </div>
    </main>

    <script type="module">
        import { getVehicles } from './products.js';

        const grid = document.getElementById('favorites-grid');
        let allVehicles = [];

        function formatPrice(usdPrice) {
            if (!usdPrice) return 'Upon Request';
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(usdPrice);
        }

        async function init() {
            try {
                const favIds = JSON.parse(localStorage.getItem('favorites') || '[]');

                if (favIds.length === 0) {
                    renderEmptyState();
                    return;
                }

                allVehicles = await getVehicles();
                const favVehicles = allVehicles.filter(v => favIds.includes(v.id));

                if (favVehicles.length === 0) {
                    renderEmptyState();
                } else {
                    renderGrid(favVehicles);
                }

            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-red-500 text-center py-12">Failed to load favorites.</div>';
                console.error(err);
            }
        }

        function renderEmptyState() {
            grid.innerHTML = `
                <div class="col-span-full bg-surface-container-low p-16 text-center border border-outline-variant/30 flex flex-col items-center justify-center">
                    <span class="material-symbols-outlined text-outline-variant text-6xl mb-6">heart_broken</span>
                    <h3 class="text-3xl font-bold tracking-tight uppercase text-white mb-4" data-i18n="fav_empty_title">No Vehicles Saved</h3>
                    <p class="text-neutral-400 text-sm uppercase tracking-widest mb-8" data-i18n="fav_empty_desc">Your curated collection is currently empty.</p>
                    <a href="inventory.html" class="bg-primary text-black font-bold uppercase tracking-widest text-xs px-8 py-4 hover:brightness-110 transition-all" data-i18n="fav_explore">
                        Explore Inventory
                    </a>
                </div>
            `;
            if (typeof applyLanguage === 'function') applyLanguage();
        }

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        function renderGrid(vehicles) {
            grid.innerHTML = vehicles.map(v => {
                const eId = escapeHTML(v.id);
                const eName = escapeHTML(v.name);
                const eImg = escapeHTML(v.image_url);
                const eVersion = escapeHTML(v.version || 'Base');
                const ePrice = formatPrice(v.price_usd);

                return `
                <div class="group relative" id="fav-card-${eId}">
                    <div class="relative overflow-hidden aspect-[16/10] bg-surface-container-low mb-8 cursor-pointer" onclick="window.location.href='details.html?id=${eId}'">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${eImg}" alt="${eName}"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
                    </div>

                    <button class="absolute top-4 right-4 z-10 bg-black/50 backdrop-blur p-2 rounded-full text-red-500 hover:text-white transition-colors" onclick="removeFav('${eId}')">
                        <span class="material-symbols-outlined">favorite</span>
                    </button>

                    <div class="flex justify-between items-start gap-3">
                        <div class="min-w-0">
                            <h3 class="text-3xl font-bold tracking-tight uppercase text-white truncate">${eName}</h3>
                            <p class="text-outline-variant text-sm uppercase tracking-widest mt-1">${eVersion}</p>
                        </div>
                        <span class="text-xl font-black text-primary whitespace-nowrap fav-price-display" data-usd="${escapeHTML(String(v.price_usd || ''))}">${escapeHTML(ePrice)}</span>
                    </div>
                </div>
            `}).join('');
            if (typeof applyLanguage === 'function') applyLanguage();
        }

        window._updateFavPrices = function() {
            document.querySelectorAll('.fav-price-display').forEach(el => {
                const usd = parseFloat(el.getAttribute('data-usd'));
                el.textContent = formatPrice(usd);
            });
        };

        window.removeFav = function(id) {
            let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            favs = favs.filter(f => f !== id);
            localStorage.setItem('favorites', JSON.stringify(favs));

            // Re-render
            const card = document.getElementById(`fav-card-${id}`);
            if (card) {
                card.remove();
                if (favs.length === 0) renderEmptyState();
            }
        };



        init();
    </script>

    <!-- Floating FAB -->

<script>

        // Mobile Menu
        const menuBtn = document.getElementById('mobile-menu-btn');
        const drawer = document.getElementById('mobile-drawer');
        if (menuBtn && drawer) {
            menuBtn.addEventListener('click', () => {
                drawer.classList.toggle('translate-x-full');
                menuBtn.innerHTML = drawer.classList.contains('translate-x-full')
                    ? '<span class="material-symbols-outlined">menu</span>'
                    : '<span class="material-symbols-outlined">close</span>';
            });
        }

        // FAB
        const fabBtn = document.getElementById('fab-btn');
        const fabPopup = document.getElementById('fab-popup');
        if (fabBtn && fabPopup) {
            fabBtn.addEventListener('click', () => {
                fabPopup.classList.toggle('hidden');
                fabPopup.classList.toggle('flex');
            });
        }

        // ==== Global Logic ====
        let currentLang = localStorage.getItem('lang') || 'en';
        let translations = {};

        async function initGlobal() {
            try {
                // Fetch translations directly
                const transRes = await fetch('translations.json').then(r => r.json());
                translations = transRes;
                applyLanguage();
                import('./events.js').then(m => m.applyEventTheme()).catch(e => console.error(e));
            } catch (err) {
                console.error("Global init error:", err);
            }
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    if (el.hasAttribute('placeholder')) {
                        el.placeholder = translations[currentLang][key];
                    } else if (el.tagName === 'OPTION') {
                        el.text = translations[currentLang][key];
                    } else {
                        if (translations[currentLang][key].includes('<')) {
                             el.innerHTML = translations[currentLang][key];
                        } else {
                             el.textContent = translations[currentLang][key];
                        }
                    }
                }
            });
            const lt = document.getElementById('lang-toggle');
            if(lt) lt.textContent = currentLang === 'en' ? 'AR' : 'EN';
            const mlt = document.getElementById('mobile-lang-toggle');
            if(mlt) mlt.textContent = currentLang === 'en' ? 'Switch to AR' : 'Switch to EN';
        }

        const langToggleBtn = document.getElementById('lang-toggle');
        if(langToggleBtn) {
            langToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }

        const mlangToggleBtn = document.getElementById('mobile-lang-toggle');
        if(mlangToggleBtn) {
            mlangToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }



        initGlobal();

</script>
