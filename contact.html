<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Motor Hub - Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Metropolis:wght@400;500;700&family=Domine:wght@400;500;700&family=Lexend:wght@400;500;700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms">
        </script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f2ca50",
                        background: "#131313",
                        surface: "#131313",
                        "on-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#4d4635"
                    }

            }
        };

    <style>
        .gold-gradient { background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%); }
        /* Premium toggle button style */
        .nav-toggle-btn {
            background: #1a1812;
            border: 1px solid rgba(242, 202, 80, 0.4);
            color: #f2ca50;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .nav-toggle-btn:hover {
            background: rgba(242, 202, 80, 0.1);
            border-color: #f2ca50;
            box-shadow: 0 0 10px rgba(242, 202, 80, 0.2);
        }
        .site-brand { text-decoration: none; cursor: pointer; }
        html, body { overflow-x: hidden; max-width: 100vw; }

        /* Social Icons */
        .social-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--color-surface-container-low, #1c1b1b);
            border: 1px solid rgba(242, 202, 80, 0.4);
            color: #f2ca50;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .social-icon-btn:hover {
            background-color: rgba(242, 202, 80, 0.1);
            border-color: #f2ca50;
            box-shadow: 0 0 15px rgba(242, 202, 80, 0.3);
            transform: translateY(-2px);
            color: #f2ca50;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">

        <!-- Clickable Logo/Brand -->
        <a href="index.html" class="site-brand text-2xl font-black tracking-tighter text-primary hover:opacity-80 transition-opacity">
            <img src="motor-hub-logo.png" alt="Motor Hub Logo" class="h-8 md:h-10 object-contain" />
        </a>

        <!-- Desktop Nav -->
        <div class="hidden md:flex gap-10 items-center">
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors text-sm" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors text-sm" href="favorites.html" data-i18n="nav_favorites">Favorites</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors text-sm" href="trading.html" data-i18n="nav_trading">Sell / Trade</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors text-sm" href="about.html" data-i18n="nav_about">About</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors text-sm" href="contact.html" data-i18n="nav_contact">Contact</a>

            <!-- Toggles -->
            <button id="lang-toggle" class="nav-toggle-btn">AR</button>
        </div>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-primary p-1">
            <span class="material-symbols-outlined">menu</span>
        </button>
    </nav>

    <!-- Mobile Drawer (Hidden by default) -->
    <div id="mobile-drawer" class="fixed inset-0 bg-neutral-900/95 backdrop-blur-3xl z-40 translate-x-full transition-transform duration-300 flex flex-col pt-28 px-6 pb-12">
        <a class="text-2xl font-bold uppercase text-white mb-6" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
        <a class="text-2xl font-bold uppercase text-white mb-6" href="favorites.html" data-i18n="nav_favorites">Favorites</a>
        <a class="text-2xl font-bold uppercase text-white mb-6" href="trading.html" data-i18n="nav_trading">Sell / Trade</a>
        <a class="text-2xl font-bold uppercase text-white mb-6" href="about.html" data-i18n="nav_about">About</a>
        <a class="text-2xl font-bold uppercase text-white mb-12" href="contact.html" data-i18n="nav_contact">Contact</a>
        <button id="mobile-lang-toggle" class="nav-toggle-btn text-left mb-4 w-fit">Switch to AR</button>
    </div>

    <main class="min-h-screen pt-32 pb-12 px-4 md:px-12 max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 w-full flex-grow">
        <!-- Left: Form -->
        <div class="lg:col-span-7 flex flex-col gap-12">
            <header>
                <div class="uppercase tracking-[0.2em] text-primary mb-4 text-xs font-bold" data-i18n="contact_inquiries_access">Inquiries & Access</div>
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 text-white" data-i18n="home_title">CONNECT WITH ELITE</h1>
            </header>

            <section class="bg-surface-container-low p-6 md:p-12 shadow-2xl">
                <form id="contact-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="relative">
                            <label class="block uppercase tracking-widest text-[10px] text-neutral-400 mb-2" data-i18n="full_name">Full Name</label>
                            <input id="name" required class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white py-3 px-0" type="text"/>
                        </div>
                        <div class="relative">
                            <label class="block uppercase tracking-widest text-[10px] text-neutral-400 mb-2" data-i18n="email">Email Address</label>
                            <input id="email" required class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white py-3 px-0" type="email"/>
                        </div>
                    </div>
                    <div class="relative">
                        <label class="block uppercase tracking-widest text-[10px] text-neutral-400 mb-2" data-i18n="inquiry_type">Inquiry Type</label>
                        <select id="subject" class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white py-3 px-0 appearance-none">
                            <option value="General Inquiry" class="bg-neutral-900" selected>General Inquiry</option>
                            <option value="Contact Support" class="bg-neutral-900">Contact Support</option>
                        </select>
                    </div>
                    <div class="relative">
                        <label class="block uppercase tracking-widest text-[10px] text-neutral-400 mb-2" data-i18n="message">Message</label>
                        <textarea id="message" required class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white py-3 px-0 resize-none" rows="4"></textarea>
                    </div>
                    <button type="submit" class="w-full gold-gradient text-neutral-900 font-bold uppercase tracking-widest py-5 flex items-center justify-center gap-3 hover:brightness-110 transition-all">
                        Initiate Inquiry <span class="material-symbols-outlined">arrow_forward</span>
                    </button>
                    <p id="toast" class="text-green-500 text-sm hidden" data-i18n="contact_success">Inquiry submitted successfully. We will contact you shortly.</p>
                </form>
            </section>
        </div>

        <!-- Right: Map -->
        <div class="lg:col-span-5 flex flex-col gap-8 h-full">
            <div class="flex-grow min-h-[400px] relative overflow-hidden bg-neutral-800">
                <iframe
                    id="map-iframe"
                    class="w-full h-full opacity-60 grayscale contrast-125 hover:grayscale-0 hover:opacity-100 transition-all duration-700"
                    src=""
                    style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
                <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent pointer-events-none">
                    <span class="text-xs uppercase tracking-widest text-primary font-bold" data-i18n="contact_flagship_gallery">Flagship Gallery | Mayfair, London</span>
                </div>
            </div>

            <!-- Social Icons Row -->
            <div class="flex justify-center flex-wrap gap-4 pt-4">
                <a href="#" id="contact-inst" class="social-icon-btn hidden" target="_blank" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" id="contact-fb" class="social-icon-btn hidden" target="_blank" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="#" id="contact-tk" class="social-icon-btn hidden" target="_blank" title="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                <a href="#" id="contact-wa" class="social-icon-btn hidden" target="_blank" title="WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
                <a href="#" id="contact-ph" class="social-icon-btn hidden" title="Call Us">
                    <i class="fa-solid fa-phone"></i>
                </a>
            </div>
        </div>
    </main>

    <script type="module">
        import { createMessage } from './messages.js';
        import { getSettings } from './settings.js';

        async function init() {
            const fallbackUrl = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2483.080512877395!2d-0.1466031842298642!3d51.51174627963625!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487604d502268421%3A0x6a7d62889992f993!2sMayfair%2C%20London!5e0!3m2!1sen!2suk!4v1620000000000!5m2!1sen!2suk";
            try {
                const settings = await getSettings();

                // Set Map URL
                if (settings && settings.map_embed_url) {
                    document.getElementById('map-iframe').src = settings.map_embed_url;
                } else {
                    document.getElementById('map-iframe').src = fallbackUrl;
                }

                // Set Social Links
                if (settings) {
                    if (settings.instagram_link) {
                        const el = document.getElementById('contact-inst');
                        el.href = settings.instagram_link;
                        el.classList.remove('hidden');
                    }
                    if (settings.facebook_link) {
                        const el = document.getElementById('contact-fb');
                        el.href = settings.facebook_link;
                        el.classList.remove('hidden');
                    }
                    if (settings.tiktok_link) {
                        const el = document.getElementById('contact-tk');
                        el.href = settings.tiktok_link;
                        el.classList.remove('hidden');
                    }
                    if (settings.whatsapp_number) {
                        const el = document.getElementById('contact-wa');
                        // Clean number for wa.me link
                        const waNum = settings.whatsapp_number.replace(/[^0-9]/g, '');
                        el.href = `https://wa.me/${waNum}`;
                        el.classList.remove('hidden');
                    }
                    if (settings.phone_number) {
                        const el = document.getElementById('contact-ph');
                        el.href = `tel:${settings.phone_number}`;
                        el.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error("Failed to load settings, using fallback", err);
                document.getElementById('map-iframe').src = fallbackUrl;
            }
        }

        init();

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const toast = document.getElementById('toast');

            btn.disabled = true;
            btn.innerHTML = 'Sending...';

            try {
                await createMessage({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    subject: document.getElementById('subject').value,
                    message: document.getElementById('message').value
                });

                e.target.reset();
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 5000);
            } catch (err) {
                alert('Failed to send message. Please try again.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Initiate Inquiry <span class="material-symbols-outlined">arrow_forward</span>';
            }
        });
    </script>

    <!-- Floating FAB -->
    <button id="fab-btn" class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-background rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform z-50">
        <span class="material-symbols-outlined">chat</span>
    </button>

    <!-- FAB Popup -->

        <a href="https://wa.me/123456789" target="_blank" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">chat_bubble</span> WhatsApp
        </a>
        <a href="tel:+123456789" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">call</span> Direct Call
        </a>
    </div>

<script>

        // Mobile Menu
        const menuBtn = document.getElementById('mobile-menu-btn');
        const drawer = document.getElementById('mobile-drawer');
        if (menuBtn && drawer) {
            menuBtn.addEventListener('click', () => {
                drawer.classList.toggle('translate-x-full');
                menuBtn.innerHTML = drawer.classList.contains('translate-x-full')
                    ? '<span class="material-symbols-outlined">menu</span>'
                    : '<span class="material-symbols-outlined">close</span>';
            });
        }

        // FAB
        const fabBtn = document.getElementById('fab-btn');
        const fabPopup = document.getElementById('fab-popup');
        if (fabBtn && fabPopup) {
            fabBtn.addEventListener('click', () => {
                fabPopup.classList.toggle('hidden');
                fabPopup.classList.toggle('flex');
            });
        }

        // ==== Global Logic ====
        let currentLang = localStorage.getItem('lang') || 'en';
        let translations = {};

        async function initGlobal() {
            try {
                // Fetch translations directly
                const transRes = await fetch('translations.json').then(r => r.json());
                translations = transRes;
                applyLanguage();
                import('./events.js').then(m => m.applyEventTheme()).catch(e => console.error(e));
            } catch (err) {
                console.error("Global init error:", err);
            }
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    if (el.hasAttribute('placeholder')) {
                        el.placeholder = translations[currentLang][key];
                    } else if (el.tagName === 'OPTION') {
                        el.text = translations[currentLang][key];
                    } else {
                        if (translations[currentLang][key].includes('<')) {
                             el.innerHTML = translations[currentLang][key];
                        } else {
                             el.textContent = translations[currentLang][key];
                        }
                    }
                }
            });
            const lt = document.getElementById('lang-toggle');
            if(lt) lt.textContent = currentLang === 'en' ? 'AR' : 'EN';
            const mlt = document.getElementById('mobile-lang-toggle');
            if(mlt) mlt.textContent = currentLang === 'en' ? 'Switch to AR' : 'Switch to EN';
        }

        const langToggleBtn = document.getElementById('lang-toggle');
        if(langToggleBtn) {
            langToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }

        const mlangToggleBtn = document.getElementById('mobile-lang-toggle');
        if(mlangToggleBtn) {
            mlangToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }



        initGlobal();

</script>
